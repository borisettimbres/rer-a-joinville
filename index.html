<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siel RER A - Joinville-le-Pont (UX Identique avec Logos Exacts)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette de couleurs RATP/Transilien */
            --ratp-bg-main: #f5f5f5; /* Gris très clair */
            --ratp-text-black: #000000;
            --ratp-bg-dark: #222222; /* Rectangle noir */
            --ratp-text-yellow: #fbc02d; /* Texte temps */
            --ratp-line-a-red: #e00021;
            --ratp-quai-gray: #b0bec5; /* Fond numéro de quai */
            --ratp-quai-border: #78909c; /* Bordure numéro de quai */
            --ratp-alert-bg: #ffffff; /* Fond alerte blanc */
            --ratp-alert-text: #000000;
            --ratp-border-gray: #e0e0e0;
        }

        body {
            background-color: var(--ratp-bg-main);
            color: var(--ratp-text-black);
            font-family: 'Cabin', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-size: 16px;
            letter-spacing: -0.5px; /* Pour un rendu compact */
        }

        /* --- En-tête (Header) --- */
        header {
            background-color: var(--ratp-bg-main);
            padding: 1vw 2vw;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            border-bottom: 0.5vw solid var(--ratp-line-a-red);
        }

        .header-logos {
            display: flex;
            align-items: center;
        }

        .header-logo-image {
            height: 4vw; /* Taille proportionnelle à la hauteur de l'en-tête */
            width: auto;
            /* L'image de base image_1.png contient déjà l'espacement et les deux logos. */
        }

        .header-destinations {
            margin-left: 2vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dest-row {
            font-size: 1.8vw;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .header-time {
            background-color: var(--ratp-bg-dark);
            color: #ffffff;
            padding: 0.8vw 1.5vw;
            border-radius: 0.5vw;
            font-size: 2.5vw;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Liste des trains --- */
        .train-list {
            flex-grow: 1;
            padding: 0 2vw;
            display: flex;
            flex-direction: column;
        }

        .train-row {
            display: grid;
            grid-template-columns: 8vw 1fr 10vw 8vw;
            align-items: center;
            padding: 1.5vh 0;
            border-bottom: 1px solid var(--ratp-border-gray);
        }

        .mission-code-container {
            display: flex;
            align-items: center;
        }

        .mission-code {
            background-color: #e0e0e0; /* Fond gris clair pour le code */
            color: var(--ratp-text-black);
            padding: 0.3vw 0.8vw;
            border-radius: 0.3vw;
            font-size: 1vw;
            font-weight: bold;
            font-family: monospace;
            text-transform: uppercase;
        }

        .destination-name {
            font-size: 2.5vw;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .time-delay-container {
            background-color: var(--ratp-bg-dark);
            color: var(--ratp-text-yellow);
            border-radius: 0.5vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 6vh;
        }

        .time-value {
            font-size: 3.5vw;
            font-weight: 700;
            line-height: 1;
        }

        .time-unit {
            font-size: 1vw;
            font-weight: normal;
        }

        .platform-container {
            background-color: var(--ratp-quai-gray);
            color: var(--ratp-text-black);
            border-radius: 0.5vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 6vw;
            height: 6vh;
            border: 1px solid var(--ratp-quai-border);
            margin-left: auto;
        }

        .platform-label {
            font-size: 1vw;
            font-weight: normal;
        }

        .platform-value {
            font-size: 2.5vw;
            font-weight: 700;
        }

        /* Message d'erreur/connexion */
        .status-msg {
            text-align: center;
            padding-top: 100px;
            font-size: 24px;
            color: #666;
        }

        /* --- Bandeau d'alerte --- */
        .footer-alert {
            background-color: var(--ratp-alert-bg);
            color: var(--ratp-alert-text);
            padding: 1.5vw 2vw;
            border-top: 2px solid var(--ratp-border-gray);
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 1.5vw;
        }

        .alert-logos {
            display: flex;
            align-items: center;
            gap: 1vw;
        }

        .alert-a-logo {
            background-color: var(--ratp-line-a-red);
            color: #ffffff;
            border-radius: 50%;
            width: 2.5vw;
            height: 2.5vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5vw;
        }

        /* Icône d'avertissement */
        .alert-warning-icon {
            color: var(--ratp-text-black);
            font-size: 2.5vw;
            line-height: 1;
        }

        .alert-text {
            font-size: 1vw;
            font-weight: normal;
            line-height: 1.2;
            text-align: left;
        }

        .alert-partner-logos {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5vw 2vw;
            background-color: #ffffff;
        }

        .logo-placeholder {
            font-size: 1.5vw;
            color: #888;
            font-weight: bold;
            padding: 0 1vw;
        }

        .ratp-logo-placeholder {
            color: #4CAF50; /* Vert RATP */
        }
        .stif-logo-placeholder {
            color: #2196F3; /* Bleu Transilien/stif */
        }
    </style>
</head>
<body>

<header>
    <div class="header-logos">
        <img src="https://i.imgur.com/G4V0I9D.png" alt="Logos RER et A" class="header-logo-image">
    </div>
    <div class="header-destinations">
        <div class="dest-row">Paris • St-Germain-en-Laye</div>
        <div class="dest-row">Poissy • Cergy</div>
    </div>
    <div class="header-time">12:25</div>
</header>

<div class="train-list" id="board">
    <div class="status-msg">Connexion aux serveurs IDFM (SIRI)...</div>
</div>

<div class="footer-alert">
    <div class="alert-logos">
        <div class="alert-a-logo">A</div>
        <div class="alert-warning-icon">⚠</div>
    </div>
    <div class="alert-text">
        Trafic normal sur l'ensemble de la ligne A. Info : Ce panneau utilise l'API officielle IDFM SIRI Temps Réel pour Joinville-le-Pont.
    </div>
</div>

<div class="alert-partner-logos">
    <div class="logo-placeholder ratp-logo-placeholder">ratp</div>
    <div class="logo-placeholder stif-logo-placeholder">stif</div>
</div>

<script>
    // Configuration de l'API IDFM (SIRI Lite avec Clé et Proxy dans l'URL)
    // J'utilise les données réelles fournies précédemment pour que l'app fonctionne.
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const STOP_ID = 'STIF:StopPoint:Q:22105:'; // ID de la gare de Joinville-le-Pont
    
    // URL IDFM + Proxy
    const TARGET_URL = `https://prim.iledefrance-mobilites.fr/marketplace/v1/stop-monitoring?MonitoringRef=${STOP_ID}&apikey=${API_KEY}`;
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(TARGET_URL);

    async function fetchSchedules() {
        try {
            const response = await fetch(PROXY_URL);
            if (!response.ok) throw new Error('Erreur API');

            const data = await response.json();
            const visits = data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit;
            
            renderBoard(visits);
        } catch (error) {
            console.error(error);
            // Si erreur, affichage du mode démorealistic pour valider l'UX
            showDemo();
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        // Filtrage des trains vers Paris/Ouest (DirectionName "A")
        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => j.DirectionName[0].value === "A")
            // Tri par heure de départ
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime))
            .slice(0, 5);

        if (trains.length === 0) {
            board.innerHTML = '<div class="status-msg">Aucun train vers l\'Ouest pour le moment.</div>';
            return;
        }

        trains.forEach(j => {
            // Nettoyage visuel de la destination (ex: "Cergy-Le Haut" devient "CERGY-LE HAUT")
            let mission = j.JourneyNote[0] ? j.JourneyNote[0].value : '----';
            let dest = j.DestinationName[0].value.toUpperCase();
            
            // Calcul du temps restant
            const arrivalTime = new Date(j.MonitoredCall.ExpectedDepartureTime);
            const diffMin = Math.floor((arrivalTime - new Date()) / 60000);
            let timeTextValue = diffMin;
            let timeTextUnit = "min";
            
            if (diffMin <= 0) {
                timeTextValue = "À"; // Pour l'approche
                timeTextUnit = "l'approche";
            }
            
            // Si le temps est très long (> 60 min), on affiche l'heure
            if (diffMin > 60) {
                timeTextValue = arrivalTime.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
                timeTextUnit = ""; // Pas d'unité
            }

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code-container"><span class="mission-code">${mission}</span></div>
                    <div class="destination-name">${dest}</div>
                    <div class="time-delay-container">
                        <div class="time-value">${timeTextValue}</div>
                        <div class="time-unit">${timeTextUnit}</div>
                    </div>
                    <div class="platform-container">
                        <div class="platform-label">quai</div>
                        <div class="platform-value">2</div>
                    </div>
                </div>`;
        });
    }

    function showDemo() {
        console.warn("API indisponible, passage en mode démo realistic");
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        // Faux trains réalistes pour Joinville-le-Pont (direction Ouest)
        const fauxTrains = [
            { mission: 'ZEUS', destination: 'ST-GERMAIN-EN-LAYE', minutes: 4 },
            { mission: 'NELY', destination: 'CERGY-LE HAUT', minutes: 12 },
            { mission: 'ZEUS', destination: 'ST-GERMAIN-EN-LAYE', minutes: 19 },
            { mission: 'TERI', destination: 'POISSY', minutes: 27 },
            { mission: 'TATI', destination: 'CERGY-LE HAUT', minutes: 35 }
        ];

        fauxTrains.forEach(t => {
            let timeTextUnit = "min";
            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code-container"><span class="mission-code">${t.mission}</span></div>
                    <div class="destination-name">${t.destination.toUpperCase()}</div>
                    <div class="time-delay-container">
                        <div class="time-value">${t.minutes}</div>
                        <div class="time-unit">${timeTextUnit}</div>
                    </div>
                    <div class="platform-container">
                        <div class="platform-label">quai</div>
                        <div class="platform-value">2</div>
                    </div>
                </div>`;
        });
        
        // Mettre à jour le message d'alerte pour indiquer le mode démo
        document.querySelector('.alert-text').innerText += " (MODE DÉMO - API indisponible)";
    }

    // Lancement immédiat
    fetchSchedules();

    // Mise à jour toutes les 30 secondes
    setInterval(fetchSchedules, 30000);
</script>

</body>
</html>
