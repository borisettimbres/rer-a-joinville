<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Siel RER A - Joinville (Solution Finale)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #c0333a; --dark: #222; --yellow: #fbc02d; }
        body { background: #f5f5f5; font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red); }
        .logo-a { background: var(--red); border-radius: 12px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: white; }
        .clock { background: var(--dark); color: white; padding: 10px 20px; border-radius: 8px; font-size: 28px; }
        .board { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .row { display: grid; grid-template-columns: 100px 1fr 130px; align-items: center; padding: 18px 0; border-bottom: 2px solid #ddd; }
        .mission { background: #ddd; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; }
        .dest { font-size: 26px; font-weight: 700; text-transform: uppercase; padding-left: 15px; }
        .time { background: var(--dark); color: var(--yellow); border-radius: 6px; text-align: center; padding: 8px; min-width: 90px; }
        .time .val { font-size: 32px; font-weight: bold; display: block; line-height: 0.8; }
        footer { background: #333; color: #0f0; padding: 10px 20px; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <div class="logo-a">A</div>
        <div style="margin-left:15px;">
            <div style="font-size:22px; font-weight:bold;">JOINVILLE-LE-PONT</div>
            <div id="dir-label" style="font-size:14px; color:var(--red)">RECHERCHE DU QUAI...</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board">
    <div style="text-align:center; margin-top:100px; color:#999;" id="status-msg">Analyse des identifiants PRIM...</div>
</div>

<footer id="debug">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    
    // On teste les 3 IDs possibles pour le RER A à Joinville
    // 41171: Quai Paris, 41170: Zone Gare, 41171 (sans :)
    const TEST_IDS = [
        'STIF:StopPoint:Q:41171:', 
        'STIF:StopPoint:Q:41171',
        'STIF:StopArea:SP:41170:'
    ];
    
    let workingId = null;

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function findWorkingId() {
        const debug = document.getElementById('debug');
        
        for (let id of TEST_IDS) {
            debug.innerText = `> Test de l'ID : ${id}`;
            const target = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${id}&apikey=${API_KEY}`;
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;

            try {
                const response = await fetch(proxy);
                const data = await response.json();
                const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];

                // Si cet ID ne renvoie pas d'erreur "Inconnu"
                if (delivery && !delivery.ErrorCondition) {
                    workingId = id;
                    debug.innerText = `> ID VALIDE TROUVÉ : ${id}`;
                    document.getElementById('dir-label').innerText = "DIRECTION PARIS / OUEST";
                    return true;
                }
            } catch (e) {
                console.log("Erreur sur l'ID " + id);
            }
        }
        return false;
    }

    async function fetchSchedules() {
        if (!workingId) {
            const success = await findWorkingId();
            if (!success) {
                document.getElementById('status-msg').innerText = "Aucun identifiant reconnu par PRIM pour Joinville RER A.";
                document.getElementById('debug').innerText = "> ÉCHEC CRITIQUE : Tous les IDs ont été rejetés.";
                return;
            }
        }

        const target = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${workingId}&apikey=${API_KEY}`;
        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}&t=${Date.now()}`;

        try {
            const response = await fetch(proxy);
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit;

            if (visits && visits.length > 0) {
                render(visits);
                document.getElementById('debug').innerText = `> Flux OK - ${new Date().toLocaleTimeString()}`;
            } else {
                document.getElementById('board').innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train en approche.</div>';
            }
        } catch (e) {
            document.getElementById('debug').innerText = "> Erreur de rafraîchissement.";
        }
    }

    function render(visits) {
        const board = document.getElementById('board');
        const now = new Date();
        
        // On trie et on filtre (vers Paris uniquement)
        let trains = visits.map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const d = j.DestinationName[0].value.toLowerCase();
                return !d.includes('boissy') && !d.includes('varenne');
            })
            .sort((a, b) => {
                const tA = new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime);
                const tB = new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime);
                return tA - tB;
            });

        let html = '';
        trains.slice(0, 6).forEach(j => {
            const mission = j.JourneyNote?.[0]?.value || j.PublishedLineName?.[0]?.value || "----";
            const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '').trim();
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);

            html += `
                <div class="row">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">
                        <span class="val">${diff <= 0 ? 'À' : diff}</span>
                        <span style="font-size:12px">${diff <= 0 ? 'approche' : 'min'}</span>
                    </div>
                </div>`;
        });
        board.innerHTML = html || '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train vers Paris.</div>';
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
