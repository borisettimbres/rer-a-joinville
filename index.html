<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const STOP_ID = 'STIF:ArretPoint:Q:22105'; 

    function log(msg) { 
        document.getElementById('debug-log').innerText = "> " + msg;
        console.log(msg);
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        log("Appel API (Format SIRI Lite)...");
        
        // URL construite selon le Swagger : host + basePath + path
        // On utilise l'URL sans "/v1/" comme indiqué dans ton document
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${STOP_ID}`;

        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'apikey': API_KEY, // Défini dans securityDefinitions
                    'Accept': 'application/json' // Défini dans "produces"
                }
            });

            // Si la réponse n'est pas 200 OK
            if (!response.ok) {
                const text = await response.text();
                // Si le serveur renvoie du HTML, c'est souvent une erreur de route (404) ou de quota
                throw new Error(`Erreur ${response.status}: ${text.substring(0, 50)}...`);
            }

            const data = await response.json();
            
            // Structure de réponse SIRI Lite (StopMonitoringResponseDelivery)
            const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];
            const visits = delivery?.MonitoredStopVisit;

            if (visits && visits.length > 0) {
                renderBoard(visits);
                log("Mise à jour effectuée à " + new Date().toLocaleTimeString());
            } else {
                log("Aucun passage trouvé pour cet arrêt.");
                document.getElementById('board').innerHTML = '<div style="text-align:center; margin-top:100px; font-size:18px; color:#999;">Aucun train en approche.</div>';
            }

        } catch (e) {
            log("ERREUR : " + e.message);
            // On affiche l'erreur visuellement pour debug
            if (e.message.includes("token '<'")) {
                log("ERREUR : Le serveur a renvoyé du HTML au lieu du JSON (Vérifiez l'URL ou la clé).");
            }
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const now = new Date();

        // Filtrage pour la direction Paris / Ouest
        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const dest = j.DestinationName[0]?.value.toLowerCase() || "";
                return !dest.includes('boissy') && !dest.includes('varenne');
            })
            .sort((a, b) => {
                const timeA = new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime);
                const timeB = new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime);
                return timeA - timeB;
            })
            .slice(0, 6);

        trains.forEach(j => {
            const mission = j.JourneyNote?.[0]?.value || j.PublishedLineName?.[0]?.value || "----";
            const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '').trim();
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diffMin = Math.round((depTime - now) / 60000);
            
            let timeVal = diffMin <= 0 ? "À" : diffMin;
            let timeUnit = diffMin <= 0 ? "l'approche" : "min";

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${mission}</div>
                    <div class="destination-name">${dest}</div>
                    <div class="time-box">
                        <span class="val">${timeVal}</span>
                        <span class="unit">${timeUnit}</span>
                    </div>
                    <div class="quai-box">
                        <span class="label">quai</span>
                        <span class="val">2</span>
                    </div>
                </div>`;
        });
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
