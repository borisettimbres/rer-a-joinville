<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siel RER A - Joinville</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-bg-main: #f5f5f5;
            --ratp-text-black: #000000;
            --ratp-bg-dark: #222222;
            --ratp-text-yellow: #fbc02d;
            --ratp-line-a-red: #c0333a;
            --ratp-quai-gray: #b0bec5;
            --ratp-border-gray: #e0e0e0;
        }

        body {
            background-color: var(--ratp-bg-main);
            color: var(--ratp-text-black);
            font-family: 'Cabin', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* --- HEADER (UX Photo & Logos) --- */
        header {
            background-color: var(--ratp-bg-main);
            padding: 15px 25px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            border-bottom: 8px solid var(--ratp-line-a-red);
        }

        .header-logos { display: flex; align-items: center; gap: 12px; }
        
        .logo-rer {
            border: 4px solid #1a1a1a; background: white; border-radius: 12px;
            width: 55px; height: 55px; display: flex; align-items: center;
            justify-content: center; font-size: 22px; font-weight: 900;
        }

        .logo-a {
            background-color: var(--ratp-line-a-red); border-radius: 12px;
            width: 65px; height: 65px; display: flex; align-items: center;
            justify-content: center; font-size: 45px; font-weight: 900; color: white;
        }

        .header-destinations { margin-left: 20px; }
        .dest-row { font-size: 22px; font-weight: 700; text-transform: uppercase; line-height: 1.1; }

        .header-time {
            background-color: var(--ratp-bg-dark); color: white;
            padding: 8px 18px; border-radius: 8px; font-size: 28px; font-weight: 700;
        }

        /* --- LISTE DES TRAINS (Structure Photo) --- */
        .train-list { flex-grow: 1; padding: 0 25px; }

        .train-row {
            display: grid;
            grid-template-columns: 130px 1fr 140px 100px;
            align-items: center;
            padding: 18px 0;
            border-bottom: 2px solid var(--ratp-border-gray);
        }

        .mission-code {
            background-color: #e0e0e0; padding: 4px 8px; border-radius: 4px;
            font-size: 15px; font-weight: bold; font-family: monospace;
        }

        .destination-name { font-size: 32px; font-weight: 700; text-transform: uppercase; }

        .time-box {
            background-color: var(--ratp-bg-dark); color: var(--ratp-text-yellow);
            border-radius: 6px; text-align: center; padding: 6px; width: 100px;
        }
        .time-box .val { font-size: 38px; font-weight: 700; display: block; line-height: 0.9; }
        .time-box .unit { font-size: 13px; text-transform: lowercase; }

        .quai-box {
            background-color: var(--ratp-quai-gray); border: 1px solid #78909c;
            border-radius: 6px; text-align: center; width: 65px; margin-left: auto;
        }
        .quai-box .label { font-size: 11px; display: block; }
        .quai-box .val { font-size: 26px; font-weight: 700; }

        /* --- FOOTER --- */
        .footer-alert {
            background: white; padding: 15px 30px;
            display: flex; align-items: center; gap: 20px;
            border-top: 2px solid var(--ratp-border-gray);
        }
        .alert-text { font-size: 15px; line-height: 1.3; flex: 1; }
    </style>
</head>
<body>

<header>
    <div class="header-logos">
        <div class="logo-rer">RER</div>
        <div class="logo-a">A</div>
    </div>
    <div class="header-destinations">
        <div class="dest-row">Paris • St-Germain-en-Laye</div>
        <div class="dest-row">Poissy • Cergy</div>
    </div>
    <div class="header-time" id="clock">--:--</div>
</header>

<div class="train-list" id="board">
    <div style="text-align:center; margin-top:100px; font-size:22px; color:#999;">Recherche des trains...</div>
</div>

<div class="footer-alert">
    <div style="background:var(--ratp-line-a-red); color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-weight:bold;">A</div>
    <div style="font-size: 25px;">⚠️</div>
    <div class="alert-text" id="status-bar">Connexion aux serveurs IDFM...</div>
</div>

<script>
    // Configuration selon le swagger.json
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopPoint:Q:22105:'; 
    
    // Construction de l'URL avec apikey en paramètre pour plus de fiabilité avec le proxy
    const TARGET_URL = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}&apikey=${API_KEY}`;
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(TARGET_URL);

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        try {
            // On envoie aussi la clé dans le header comme demandé par le contrat
            const response = await fetch(PROXY_URL, {
                method: 'GET',
                headers: { 'apikey': API_KEY }
            });

            if (!response.ok) throw new Error(`Code ${response.status}`);
            
            const data = await response.json();
            
            // Traitement du format SIRI Lite
            if (data.Siri && data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit) {
                renderBoard(data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit);
                document.getElementById('status-bar').innerText = "Trafic normal sur l'ensemble de la ligne A.";
            } else {
                document.getElementById('status-bar').innerText = "⚠️ Aucune donnée reçue (Pas de trains).";
            }
        } catch (error) {
            console.error(error);
            document.getElementById('status-bar').innerText = `⚠️ Erreur de liaison API (${error.message}). Vérifiez votre compte PRIM.`;
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            // On filtre pour la direction Paris/Ouest (DirectionName A)
            .filter(j => j.DirectionName[0].value === "A")
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime))
            .slice(0, 5);

        trains.forEach(j => {
            const mission = j.JourneyNote[0] ? j.JourneyNote[0].value : '----';
            const dest = j.DestinationName[0].value.toUpperCase();
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime);
            const diffMin = Math.floor((depTime - new Date()) / 60000);
            
            let timeVal = diffMin <= 0 ? "À" : diffMin;
            let timeUnit = diffMin <= 0 ? "l'approche" : "min";

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${mission}</div>
                    <div class="destination-name">${dest}</div>
                    <div class="time-box">
                        <span class="val">${timeVal}</span>
                        <span class="unit">${timeUnit}</span>
                    </div>
                    <div class="quai-box">
                        <span class="label">quai</span>
                        <span class="val">2</span>
                    </div>
                </div>`;
        });
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
