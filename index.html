<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siel RER A - Joinville</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-bg-main: #f5f5f5;
            --ratp-text-black: #000000;
            --ratp-bg-dark: #222222;
            --ratp-text-yellow: #fbc02d;
            --ratp-line-a-red: #c0333a; /* Rouge exact du RER A */
            --ratp-quai-gray: #b0bec5;
            --ratp-border-gray: #e0e0e0;
        }

        body {
            background-color: var(--ratp-bg-main);
            color: var(--ratp-text-black);
            font-family: 'Cabin', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            letter-spacing: -0.5px;
        }

        /* --- HEADER LOGOS EN CSS (REPRODUCTION IMAGE) --- */
        header {
            background-color: var(--ratp-bg-main);
            padding: 1vw 2vw;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            border-bottom: 0.5vw solid var(--ratp-line-a-red);
        }

        .header-logos {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Logo RER : Carré blanc, bordure noire arrondie */
        .logo-rer-css {
            border: 4px solid #1a1a1a;
            background: white;
            border-radius: 12px;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            color: #1a1a1a;
        }

        /* Logo A : Carré rouge, texte blanc arrondi */
        .logo-a-css {
            background-color: var(--ratp-line-a-red);
            border-radius: 12px;
            width: 63px;
            height: 63px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: 900;
            color: white;
        }

        .header-destinations {
            margin-left: 20px;
            display: flex;
            flex-direction: column;
        }

        .dest-row { font-size: 1.8vw; font-weight: 700; text-transform: uppercase; }

        .header-time {
            background-color: var(--ratp-bg-dark);
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 2.2vw;
            font-weight: 700;
        }

        /* --- LISTE DES TRAINS --- */
        .train-list { flex-grow: 1; padding: 0 2vw; }

        .train-row {
            display: grid;
            grid-template-columns: 100px 1fr 120px 100px;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--ratp-border-gray);
        }

        .mission-code {
            background-color: #e0e0e0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
            text-align: center;
            width: fit-content;
        }

        .destination-name { font-size: 2.4vw; font-weight: 700; text-transform: uppercase; }

        .time-box {
            background-color: var(--ratp-bg-dark);
            color: var(--ratp-text-yellow);
            border-radius: 6px;
            text-align: center;
            padding: 5px;
            width: 90px;
        }

        .time-box .val { font-size: 32px; font-weight: 700; display: block; }
        .time-box .unit { font-size: 12px; display: block; margin-top: -5px; }

        .quai-box {
            background-color: var(--ratp-quai-gray);
            border: 1px solid #78909c;
            border-radius: 6px;
            text-align: center;
            width: 60px;
            margin-left: auto;
        }
        .quai-box .label { font-size: 10px; display: block; }
        .quai-box .val { font-size: 24px; font-weight: 700; display: block; }

        /* --- FOOTER --- */
        .footer-alert {
            background: white;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 2px solid var(--ratp-border-gray);
        }

        .alert-logo-a {
            background: var(--ratp-line-a-red);
            color: white;
            border-radius: 50%;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        .alert-text { font-size: 13px; line-height: 1.3; }

        .status-msg { text-align: center; margin-top: 50px; color: #999; }
    </style>
</head>
<body>

<header>
    <div class="header-logos">
        <div class="logo-rer-css">RER</div>
        <div class="logo-a-css">A</div>
    </div>
    <div class="header-destinations">
        <div class="dest-row">Paris • St-Germain-en-Laye</div>
        <div class="dest-row">Poissy • Cergy</div>
    </div>
    <div class="header-time" id="clock">12:25</div>
</header>

<div class="train-list" id="board">
    <div class="status-msg">Chargement des données SIEL...</div>
</div>

<div class="footer-alert">
    <div class="alert-logo-a">A</div>
    <div style="font-size: 24px;">⚠</div>
    <div class="alert-text">
        Trafic normal sur l'ensemble de la ligne A. Info : Ce panneau utilise l'API officielle IDFM Temps Réel pour Joinville-le-Pont.
    </div>
</div>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const STOP_ID = 'STIF:StopPoint:Q:22105:'; 
    const TARGET_URL = `https://prim.iledefrance-mobilites.fr/marketplace/v1/stop-monitoring?MonitoringRef=${STOP_ID}&apikey=${API_KEY}`;
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(TARGET_URL);

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        try {
            const response = await fetch(PROXY_URL);
            const data = await response.json();
            const visits = data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit;
            renderBoard(visits);
        } catch (error) {
            console.error(error);
            showDemo();
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => j.DirectionName[0].value === "A")
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime))
            .slice(0, 5);

        trains.forEach(j => {
            const mission = j.JourneyNote[0] ? j.JourneyNote[0].value : '----';
            const dest = j.DestinationName[0].value.toUpperCase();
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime);
            const diffMin = Math.floor((depTime - new Date()) / 60000);
            
            let timeVal = diffMin;
            let timeUnit = "min";
            if (diffMin <= 0) { timeVal = "À"; timeUnit = "l'approche"; }

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${mission}</div>
                    <div class="destination-name">${dest}</div>
                    <div class="time-box">
                        <span class="val">${timeVal}</span>
                        <span class="unit">${timeUnit}</span>
                    </div>
                    <div class="quai-box">
                        <span class="label">quai</span>
                        <span class="val">2</span>
                    </div>
                </div>`;
        });
    }

    function showDemo() {
        const board = document.getElementById('board');
        board.innerHTML = '<div class="status-msg">Mode Démo (API déconnectée)</div>';
        const faux = [
            {m:'ZEUS', d:'ST-GERMAIN-EN-LAYE', t:4},
            {m:'NELY', d:'CERGY-LE-HAUT', t:12},
            {m:'TERI', d:'POISSY', t:22}
        ];
        faux.forEach(f => {
            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${f.m}</div>
                    <div class="destination-name">${f.d}</div>
                    <div class="time-box"><span class="val">${f.t}</span><span class="unit">min</span></div>
                    <div class="quai-box"><span class="label">quai</span><span class="val">2</span></div>
                </div>`;
        });
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>

</body>
</html>
