<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Siel RER A - Joinville (V37)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ratp-red: #c0333a; --ratp-dark: #222; --ratp-yellow: #fbc02d; }
        body { background: #f5f5f5; font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--ratp-red); }
        .logo-a { background: var(--ratp-red); border-radius: 12px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: white; }
        .clock { background: var(--ratp-dark); color: white; padding: 10px 20px; border-radius: 8px; font-size: 28px; }
        .board { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .row { display: grid; grid-template-columns: 100px 1fr 120px; align-items: center; padding: 15px 0; border-bottom: 2px solid #ddd; }
        .mission { background: #ddd; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; }
        .dest { font-size: 26px; font-weight: 700; text-transform: uppercase; padding-left: 15px; }
        .time { background: var(--ratp-dark); color: var(--ratp-yellow); border-radius: 6px; text-align: center; padding: 8px; min-width: 80px; }
        .time .val { font-size: 32px; font-weight: bold; display: block; line-height: 0.8; }
        footer { background: #333; color: #0f0; padding: 10px 20px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <div class="logo-a">A</div>
        <div style="margin-left:15px;">
            <div style="font-size:22px; font-weight:bold;">JOINVILLE-LE-PONT</div>
            <div id="direction-label" style="font-size:14px; color:var(--ratp-red)">DIRECTION PARIS</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board">
    <div style="text-align:center; margin-top:100px; color:#999;">Analyse du dépôt GitHub et connexion...</div>
</div>

<footer id="debug-log">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    
    // Liste des IDs à tester (Quai 2 Paris, puis Quai 1 Province en secours)
    const STOP_IDS = ['STIF:StopPoint:Q:22105:', 'STIF:StopPoint:Q:22106:'];
    let currentIdIndex = 0;

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug-log');
        const board = document.getElementById('board');
        const stopId = STOP_IDS[currentIdIndex];

        debug.innerText = `> Tentative avec ID : ${stopId}`;

        // URL "Pure" sans LineRef pour éviter l'erreur 400
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${stopId}&apikey=${API_KEY}`;
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`;

        try {
            const response = await fetch(proxy);
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];

            // Si cet ID est inconnu, on bascule sur le suivant
            if (delivery?.ErrorCondition) {
                debug.innerText = `> ID ${stopId} inconnu. Basculement...`;
                currentIdIndex = (currentIdIndex + 1) % STOP_IDS.length;
                setTimeout(fetchSchedules, 1000);
                return;
            }

            const visits = delivery?.MonitoredStopVisit;

            if (!visits || visits.length === 0) {
                debug.innerText = "> Pas de trains sur cet ID. Test du suivant...";
                currentIdIndex = (currentIdIndex + 1) % STOP_IDS.length;
                setTimeout(fetchSchedules, 1000);
                return;
            }

            // SUCCÈS : On affiche les trains
            debug.innerText = `> Flux OK (${visits.length} trains) - ID: ${stopId}`;
            render(visits);

        } catch (e) {
            debug.innerText = "> Erreur de connexion au proxy.";
        }
    }

    function render(visits) {
        const board = document.getElementById('board');
        const now = new Date();
        
        let html = '';
        visits.forEach(v => {
            const j = v.MonitoredVehicleJourney;
            const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '');
            const mission = j.JourneyNote?.[0]?.value || j.PublishedLineName?.[0]?.value || "??";
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);

            html += `
                <div class="row">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">
                        <span class="val">${diff <= 0 ? 'À' : diff}</span>
                        <span style="font-size:10px">${diff <= 0 ? 'approche' : 'min'}</span>
                    </div>
                </div>`;
        });
        board.innerHTML = html;
        
        // Mise à jour de l'étiquette de direction selon l'ID qui a fonctionné
        document.getElementById('direction-label').innerText = (STOP_IDS[currentIdIndex].includes('22105')) ? "DIRECTION PARIS / OUEST" : "DIRECTION BOISSY / PROVINCE";
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
