<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siel RER A - Live Joinville</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-bg-main: #f5f5f5;
            --ratp-text-black: #000000;
            --ratp-bg-dark: #222222;
            --ratp-text-yellow: #fbc02d;
            --ratp-line-a-red: #c0333a;
            --ratp-quai-gray: #b0bec5;
            --ratp-border-gray: #e0e0e0;
        }

        body {
            background-color: var(--ratp-bg-main);
            color: var(--ratp-text-black);
            font-family: 'Cabin', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header {
            background-color: var(--ratp-bg-main);
            padding: 15px 25px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            border-bottom: 8px solid var(--ratp-line-a-red);
        }

        .header-logos { display: flex; align-items: center; gap: 12px; }
        .logo-rer { border: 4px solid #1a1a1a; background: white; border-radius: 12px; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; }
        .logo-a { background-color: var(--ratp-line-a-red); border-radius: 12px; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; color: white; }
        .header-destinations { margin-left: 20px; }
        .dest-row { font-size: 22px; font-weight: 700; text-transform: uppercase; line-height: 1.1; }
        .header-time { background-color: var(--ratp-bg-dark); color: white; padding: 8px 18px; border-radius: 8px; font-size: 28px; font-weight: 700; }

        .train-list { flex-grow: 1; padding: 0 25px; }
        .train-row { display: grid; grid-template-columns: 130px 1fr 140px 100px; align-items: center; padding: 18px 0; border-bottom: 2px solid var(--ratp-border-gray); }
        .mission-code { background-color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 15px; font-weight: bold; font-family: monospace; text-align: center; }
        .destination-name { font-size: 32px; font-weight: 700; text-transform: uppercase; }
        .time-box { background-color: var(--ratp-bg-dark); color: var(--ratp-text-yellow); border-radius: 6px; text-align: center; padding: 6px; width: 100px; }
        .time-box .val { font-size: 38px; font-weight: 700; display: block; line-height: 0.9; }
        .time-box .unit { font-size: 13px; text-transform: lowercase; }
        .quai-box { background-color: var(--ratp-quai-gray); border: 1px solid #78909c; border-radius: 6px; text-align: center; width: 65px; margin-left: auto; }
        .quai-box .label { font-size: 11px; display: block; }
        .quai-box .val { font-size: 26px; font-weight: 700; }

        .footer-alert { background: white; padding: 15px 30px; display: flex; align-items: center; gap: 20px; border-top: 2px solid var(--ratp-border-gray); }
        .alert-text { font-size: 15px; line-height: 1.3; flex: 1; }
        .debug-area { font-size: 10px; color: #999; font-family: monospace; overflow: auto; max-height: 50px; }
    </style>
</head>
<body>

<header>
    <div class="header-logos">
        <div class="logo-rer">RER</div>
        <div class="logo-a">A</div>
    </div>
    <div class="header-destinations">
        <div class="dest-row">Joinville-le-Pont</div>
        <div class="dest-row" style="font-size: 16px; color: #666;">Flux Global (Toutes Directions)</div>
    </div>
    <div class="header-time" id="clock">--:--</div>
</header>

<div class="train-list" id="board">
    <div style="text-align:center; margin-top:100px; font-size:22px; color:#999;">Synchronisation SIRI...</div>
</div>

<div class="footer-alert">
    <div style="background:var(--ratp-line-a-red); color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-weight:bold;">A</div>
    <div class="alert-text" id="status-bar">Liaison établie.</div>
    <div id="debug" class="debug-area"></div>
</div>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    
    // CHANGEMENT : On utilise le StopArea (SP) au lieu du StopPoint (Q)
    const MONITORING_REF = 'STIF:StopArea:SP:22105'; 
    const TARGET_URL = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}&apikey=${API_KEY}`;
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(TARGET_URL);

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        try {
            const response = await fetch(PROXY_URL);
            if (!response.ok) throw new Error(`Code ${response.status}`);
            
            const data = await response.json();
            
            // DEBUG : On affiche dans la console et sur l'écran si c'est vide
            console.log("Données reçues :", data);
            
            const delivery = data.Siri.ServiceDelivery.StopMonitoringDelivery[0];
            const visits = delivery.MonitoredStopVisit || [];

            if (visits.length > 0) {
                renderBoard(visits);
                document.getElementById('status-bar').innerText = "Trafic en temps réel actif.";
            } else {
                document.getElementById('board').innerHTML = '<div style="text-align:center; margin-top:100px; font-size:22px; color:#999;">Aucun train dans le flux actuel.<br><small>Vérifiez si l\'ID de la gare est correct sur PRIM.</small></div>';
                document.getElementById('debug').innerText = "Réponse serveur : " + JSON.stringify(data).substring(0, 100);
            }
        } catch (error) {
            document.getElementById('status-bar').innerText = `⚠️ Erreur : ${error.message}`;
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        // On trie par heure mais on ne filtre RIEN (on veut tout voir pour tester)
        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime))
            .slice(0, 6);

        trains.forEach(j => {
            const mission = j.JourneyNote[0] ? j.JourneyNote[0].value : '----';
            const dest = j.DestinationName[0].value.toUpperCase();
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime);
            const diffMin = Math.floor((depTime - new Date()) / 60000);
            
            let timeVal = diffMin <= 0 ? "À" : diffMin;
            let timeUnit = diffMin <= 0 ? "l'approche" : "min";

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${mission}</div>
                    <div class="destination-name">${dest}</div>
                    <div class="time-box">
                        <span class="val">${timeVal}</span>
                        <span class="unit">${timeUnit}</span>
                    </div>
                    <div class="quai-box">
                        <span class="label">quai</span>
                        <span class="val">${j.MonitoredCall.ArrivalPlatformName ? j.MonitoredCall.ArrivalPlatformName.value : '-'}</span>
                    </div>
                </div>`;
        });
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
