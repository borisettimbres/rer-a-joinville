<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Siel RER A - Joinville</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #c0333a; --dark: #222; --yellow: #fbc02d; }
        body { background: #f5f5f5; font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red); }
        .logo-a { background: var(--red); border-radius: 12px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: white; }
        .clock { background: var(--dark); color: white; padding: 10px 20px; border-radius: 8px; font-size: 28px; }
        .board { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .row { display: grid; grid-template-columns: 100px 1fr 130px; align-items: center; padding: 18px 0; border-bottom: 2px solid #ddd; }
        .mission { background: #ddd; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; }
        .dest { font-size: 28px; font-weight: 700; text-transform: uppercase; padding-left: 15px; }
        .time { background: var(--dark); color: var(--yellow); border-radius: 6px; text-align: center; padding: 8px; min-width: 90px; }
        .time .val { font-size: 36px; font-weight: bold; display: block; line-height: 0.8; }
        footer { background: #333; color: #0f0; padding: 10px 20px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <div class="logo-a">A</div>
        <div style="margin-left:15px;">
            <div style="font-size:24px; font-weight:bold;">JOINVILLE-LE-PONT</div>
            <div style="font-size:14px; color:var(--red)">DIRECTION PARIS (TEMPS RÉEL)</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board">
    <div style="text-align:center; margin-top:100px; color:#999;">Connexion au flux IDFM...</div>
</div>

<footer id="debug">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const GARE_ID = 'STIF:StopArea:SP:41170'; // Gare de Joinville
    const LIGNE_ID = 'STIF:Line::C01742:';    // RER A
    
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug');
        const board = document.getElementById('board');
        
        debug.innerText = "> Interrogation du serveur...";

        // Construction de l'URL avec les DEUX identifiants obligatoires pour le RER
        const target = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${GARE_ID}&LineRef=${LIGNE_ID}&apikey=${API_KEY}`;
        
        // Proxy AllOrigins en mode RAW (récupère le JSON direct sans emballage)
        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;

        try {
            const response = await fetch(proxy);
            if (!response.ok) throw new Error("Erreur de connexion");

            const data = await response.json();
            const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];

            if (delivery?.ErrorCondition) {
                throw new Error(delivery.ErrorCondition.ErrorInformation.ErrorText);
            }

            const visits = delivery?.MonitoredStopVisit;

            if (visits && visits.length > 0) {
                debug.innerText = `> Flux OK (${visits.length} trains)`;
                render(visits);
            } else {
                debug.innerText = "> Aucun train trouvé pour le RER A.";
                board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train détecté par le serveur.</div>';
            }

        } catch (e) {
            debug.innerText = "> " + e.message;
            board.innerHTML = `<div style="text-align:center;margin-top:100px;color:red;">Erreur : ${e.message}</div>`;
        }
    }

    function render(visits) {
        const board = document.getElementById('board');
        const now = new Date();
        
        // Filtrage pour ne garder que la direction Paris
        // (On exclut Boissy et La Varenne)
        let trains = visits.map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const d = j.DestinationName[0].value.toLowerCase();
                return !d.includes('boissy') && !d.includes('varenne');
            })
            .sort((a, b) => {
                const tA = new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime);
                const tB = new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime);
                return tA - tB;
            });

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Tous les trains sont vers la Province.</div>';
            return;
        }

        let html = '';
        trains.slice(0, 6).forEach(j => {
            const mission = j.JourneyNote?.[0]?.value || j.PublishedLineName?.[0]?.value || "??";
            const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '').trim();
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);

            html += `
                <div class="row">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">
                        <span class="val">${diff <= 0 ? 'À' : diff}</span>
                        <span style="font-size:12px">${diff <= 0 ? 'approche' : 'min'}</span>
                    </div>
                </div>`;
        });
        board.innerHTML = html;
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
