<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RER A - Joinville SIEL</title>
    <style>
        :root {
            --ratp-blue: #0055c8;
            --rer-a-red: #e3051c;
            --bg-black: #000000;
            --text-yellow: #ffcc00;
            --text-white: #ffffff;
        }
        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Arial Narrow', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }
        header {
            background-color: #1a1a1a; padding: 20px 30px;
            display: flex; align-items: center;
            border-bottom: 6px solid var(--rer-a-red);
        }
        .logo-rer {
            background-color: var(--rer-a-red); color: white; border-radius: 50%;
            width: 60px; height: 60px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 40px; margin-right: 20px;
        }
        .station-name { font-size: 32px; text-transform: uppercase; font-weight: 900; line-height: 1.2; }
        .train-list { flex-grow: 1; padding: 10px 40px; }
        .train-row {
            display: grid; grid-template-columns: 140px 1fr 220px;
            align-items: center; padding: 25px 0; border-bottom: 2px solid #333;
        }
        .mission { color: var(--text-yellow); font-size: 38px; font-weight: bold; font-family: monospace; }
        .destination { font-size: 42px; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .time { font-size: 42px; color: var(--text-yellow); text-align: right; font-weight: bold; }
        .status-msg { text-align: center; padding-top: 100px; font-size: 24px; color: #666; }
        footer { background-color: var(--ratp-blue); height: 60px; display: flex; align-items: center; overflow: hidden; }
        .marquee { white-space: nowrap; font-size: 24px; font-weight: bold; animation: scroll 30s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<header>
    <div class="logo-rer">A</div>
    <div class="station-name">Joinville-le-Pont <br><span style="color:var(--text-yellow); font-size:18px;">Direction PARIS / OUEST</span></div>
</header>

<div class="train-list" id="board">
    <div class="status-msg">Connexion aux serveurs IDFM (SIEL)...</div>
</div>

<footer>
    <div class="marquee">⚠️ Trafic normal sur l'ensemble de la ligne A. Bienvenue à bord. Attention à la marche en descendant du train.</div>
</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const STOP_ID = 'STIF:StopPoint:Q:22105:'; 

    // On combine la clé dans l'URL + le proxy pour une compatibilité totale sur iPad
    const TARGET_URL = `https://prim.iledefrance-mobilites.fr/marketplace/v1/stop-monitoring?MonitoringRef=${STOP_ID}&apikey=${API_KEY}`;
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(TARGET_URL);

    async function fetchSchedules() {
        try {
            const response = await fetch(PROXY_URL);
            if (!response.ok) throw new Error('Erreur Réseau ou Clé');

            const data = await response.json();
            
            if (data.Siri && data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit) {
                const visits = data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit;
                renderBoard(visits);
            } else {
                document.getElementById('board').innerHTML = '<div class="status-msg">Aucun train en approche</div>';
            }
        } catch (error) {
            console.error(error);
            document.getElementById('board').innerHTML = 
                `<div class="status-msg" style="color:#e3051c">Erreur de liaison API<br><small style="font-size:14px; color:#666;">Vérifiez votre abonnement "Requête Unitaire" sur PRIM</small></div>`;
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            // On ne garde que le sens vers Paris (A)
            .filter(j => j.DirectionName[0].value === "A")
            // Tri par heure de départ
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime))
            .slice(0, 5);

        if (trains.length === 0) {
            board.innerHTML = '<div class="status-msg">Aucun train vers l\'Ouest pour le moment</div>';
            return;
        }

        trains.forEach(j => {
            const mission = j.JourneyNote[0] ? j.JourneyNote[0].value : '----';
            const dest = j.DestinationName[0].value;
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime);
            
            const diffMin = Math.floor((depTime - new Date()) / 60000);
            let timeText = diffMin + " min";
            
            if (diffMin <= 0) timeText = "À l'approche";
            if (diffMin > 60) timeText = depTime.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission">${mission}</div>
                    <div class="destination">${dest}</div>
                    <div class="time">${timeText}</div>
                </div>`;
        });
    }

    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
