<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scanner Diagnostic RER A - Joinville</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .test-box { border: 1px solid #444; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .testing { color: #aaa; }
        .success { border-color: #4caf50; background: #1b301b; }
        .empty { color: #ffa000; }
        .error { color: #f44336; }
        pre { font-size: 10px; background: #000; padding: 10px; overflow: auto; max-height: 150px; }
        .badge { padding: 3px 8px; border-radius: 3px; font-weight: bold; font-size: 12px; }
        .b-ok { background: #4caf50; color: #fff; }
        .b-null { background: #555; color: #fff; }
    </style>
</head>
<body>

    <h2>Diagnostic Joinville-le-Pont (RER A)</h2>
    <p>Ce script teste les IDs issus de vos fichiers CSV avec l'auth "Slide 13".</p>
    
    <div id="results"></div>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    
    // Les 4 familles d'IDs identifiées dans vos documents
    const TARGETS = [
        { id: 'STIF:StopPoint:Q:473943:', desc: 'ID technique SNCF (Périmètre TR)' },
        { id: 'STIF:StopPoint:Q:43135:',  desc: 'ID physique (Fichier Gares)' },
        { id: 'STIF:StopArea:SP:70640:',  desc: 'Zone Correspondance (ZDC)' },
        { id: 'STIF:StopPoint:Q:41171:',  desc: 'Identifiant Standard RATP' }
    ];

    async function runDiagnostic() {
        const container = document.getElementById('results');
        
        for (let target of TARGETS) {
            const div = document.createElement('div');
            div.className = 'test-box testing';
            div.innerHTML = `<strong>Test : ${target.id}</strong><br><small>${target.desc}</small><br>Connexion...`;
            container.appendChild(div);

            const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${target.id}`;
            const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;

            try {
                const response = await fetch(proxy, {
                    method: 'GET',
                    headers: { 'apiKey': API_KEY, 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];

                if (visits.length > 0) {
                    div.className = 'test-box success';
                    div.innerHTML = `
                        <span class="badge b-ok">FLUX TROUVÉ</span> 
                        <strong>${target.id}</strong> (${visits.length} trains)<br>
                        <small>${target.desc}</small>
                        <pre>${JSON.stringify(visits[0].MonitoredVehicleJourney.DestinationName, null, 2)}</pre>
                    `;
                } else {
                    div.className = 'test-box';
                    div.innerHTML = `
                        <span class="badge b-null">VIDE</span> 
                        <strong>${target.id}</strong><br>
                        <small>Connecté, mais le flux ne contient aucun passage.</small>
                    `;
                }
            } catch (e) {
                div.className = 'test-box error';
                div.innerHTML = `<strong>${target.id}</strong><br>Erreur : ${e.message}`;
            }
        }
    }

    runDiagnostic();
</script>
</body>
</html>
