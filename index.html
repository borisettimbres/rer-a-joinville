<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Siel RER A - Joinville (Multi-Flux)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --ratp-red: #c0333a; --ratp-dark: #222; --ratp-yellow: #fbc02d; }
        body { background: #f5f5f5; font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--ratp-red); }
        .logo-a { background: var(--ratp-red); border-radius: 12px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: white; }
        .clock { background: var(--ratp-dark); color: white; padding: 10px 20px; border-radius: 8px; font-size: 28px; }
        .board { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .row { display: grid; grid-template-columns: 100px 1fr 130px; align-items: center; padding: 18px 0; border-bottom: 2px solid #ddd; }
        .mission { background: #ddd; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; }
        .dest { font-size: 28px; font-weight: 700; text-transform: uppercase; padding-left: 15px; }
        .time { background: var(--ratp-dark); color: var(--ratp-yellow); border-radius: 6px; text-align: center; padding: 8px; min-width: 90px; }
        .time .val { font-size: 36px; font-weight: bold; display: block; line-height: 0.8; }
        footer { background: #333; color: #0f0; padding: 10px 20px; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <div class="logo-a">A</div>
        <div style="margin-left:15px;">
            <div style="font-size:24px; font-weight:bold;">JOINVILLE-LE-PONT</div>
            <div id="dir-label" style="font-size:14px; color:var(--ratp-red)">DIRECTION PARIS / OUEST</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board">
    <div style="text-align:center; margin-top:100px; color:#999;" id="main-status">Établissement d'une connexion sécurisée...</div>
</div>

<footer id="debug-log">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    // ID extrait de votre fichier "Perimètre TR" ligne 19841
    const STOP_ID = 'STIF:StopPoint:Q:473943:'; 
    const LINE_ID = 'STIF:Line::C01742:';

    // Liste de secours des proxys si l'un d'eux affiche "Load failed"
    const PROXIES = [
        (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
    ];
    let currentProxyIndex = 0;

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug-log');
        const status = document.getElementById('main-status');
        
        const targetUrl = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${STOP_ID}&LineRef=${LINE_ID}&apikey=${API_KEY}`;
        const finalUrl = PROXIES[currentProxyIndex](targetUrl);

        debug.innerText = `> Tentative via Proxy #${currentProxyIndex + 1}...`;

        try {
            const response = await fetch(finalUrl);
            if (!response.ok) throw new Error("Erreur HTTP " + response.status);

            const json = await response.json();
            
            // AllOrigins emballe dans .contents, les autres non
            const data = json.contents ? JSON.parse(json.contents) : json;

            const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];
            if (delivery?.ErrorCondition) throw new Error("IDFM : " + delivery.ErrorCondition.ErrorInformation.ErrorText);

            const visits = delivery?.MonitoredStopVisit;

            if (visits && visits.length > 0) {
                render(visits);
                debug.innerText = `> Flux OK (Proxy #${currentProxyIndex + 1}) - ${new Date().toLocaleTimeString()}`;
            } else {
                debug.innerText = "> Connecté, mais aucun train trouvé.";
                document.getElementById('board').innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train en approche (Vérifiez le sens).</div>';
            }

        } catch (e) {
            console.error(e);
            debug.innerText = `> Échec Proxy #${currentProxyIndex + 1} : ${e.message}`;
            
            // Si on a encore des proxys en réserve, on change et on réessaie tout de suite
            if (currentProxyIndex < PROXIES.length - 1) {
                currentProxyIndex++;
                fetchSchedules();
            } else {
                currentProxyIndex = 0; // On reset pour le prochain cycle de 30s
                status.innerHTML = `<div style="color:red;text-align:center;margin-top:100px;"><b>ERREUR DE CHARGEMENT</b><br>Tous les serveurs sont saturés.<br><small>${e.message}</small></div>`;
            }
        }
    }

    function render(visits) {
        const board = document.getElementById('board');
        const now = new Date();
        
        // On filtre Paris : On exclut Boissy et La Varenne
        let trains = visits.map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const d = j.DestinationName[0].value.toLowerCase();
                return !d.includes('boissy') && !d.includes('varenne');
            })
            .sort((a, b) => {
                const tA = new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime);
                const tB = new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime);
                return tA - tB;
            });

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Pas de trains vers Paris trouvés (Essayer le quai d\'en face ?).</div>';
            return;
        }

        let html = '';
        trains.slice(0, 7).forEach(j => {
            const mission = j.JourneyNote?.[0]?.value || j.PublishedLineName?.[0]?.value || "----";
            const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '').trim();
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);

            html += `
                <div class="row">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">
                        <span class="val">${diff <= 0 ? 'À' : diff}</span>
                        <span style="font-size:12px">${diff <= 0 ? 'approche' : 'min'}</span>
                    </div>
                </div>`;
        });
        board.innerHTML = html;
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
