<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scanner Debug PRIM - Joinville</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .status { padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .ok { background: #2e7d32; }
        .error { background: #c62828; }
        .train-card { background: #333; padding: 15px; margin-bottom: 10px; border-left: 5px solid #c0333a; }
        pre { background: #000; color: #00ff00; padding: 15px; overflow: auto; max-height: 300px; font-size: 11px; border: 1px solid #444; }
        h3 { color: #fbc02d; margin-top: 0; }
        .meta { color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Scanner Temps Réel - Joinville-le-Pont</h2>
    <div id="status-box" class="status">Initialisation...</div>

    <div id="results">
        <h3>Trains détectés (Sans filtre) :</h3>
        <div id="train-list">En attente de données...</div>
    </div>

    <hr>
    <h3>Réponse JSON brute du serveur :</h3>
    <pre id="raw-json">Aucune donnée reçue pour le moment.</pre>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    
    // STRATÉGIE : On essaie l'ID de la ZONE (StopArea) qui est plus global que le point (StopPoint)
    // Si celui-ci ne marche pas, on testera STIF:StopPoint:Q:22105:
    const STOP_ID = 'STIF:StopArea:SP:41170'; 

    async function scan() {
        const statusBox = document.getElementById('status-box');
        const rawBox = document.getElementById('raw-json');
        const list = document.getElementById('train-list');

        const TARGET_URL = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${STOP_ID}&apikey=${API_KEY}`;
        const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET_URL)}`;

        try {
            statusBox.innerText = "Connexion au proxy...";
            const response = await fetch(PROXY_URL);
            const wrapper = await response.json();
            
            if (!wrapper.contents) {
                throw new Error("Le proxy a renvoyé une enveloppe vide.");
            }

            rawBox.innerText = wrapper.contents; // On affiche le JSON brut quoi qu'il arrive
            const data = JSON.parse(wrapper.contents);
            
            const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];
            const visits = delivery?.MonitoredStopVisit;

            if (!visits || visits.length === 0) {
                statusBox.className = "status error";
                statusBox.innerText = "Connecté, mais l'API renvoie une liste de trains VIDE.";
                list.innerHTML = "Aucun train dans le flux JSON.";
                return;
            }

            statusBox.className = "status ok";
            statusBox.innerText = `Succès ! ${visits.length} trains trouvés dans le flux.`;
            
            // Affichage simple de tous les trains sans exception
            list.innerHTML = "";
            visits.forEach(v => {
                const j = v.MonitoredVehicleJourney;
                const dest = j.DestinationName[0].value;
                const time = j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime;
                
                list.innerHTML += `
                    <div class="train-card">
                        <strong>Destination : ${dest}</strong><br>
                        <span class="meta">Heure : ${new Date(time).toLocaleTimeString()} | Mission : ${j.JourneyNote?.[0]?.value || 'N/A'}</span>
                    </div>`;
            });

        } catch (e) {
            statusBox.className = "status error";
            statusBox.innerText = "ERREUR : " + e.message;
        }
    }

    scan();
    setInterval(scan, 30000);
</script>
</body>
</html>
