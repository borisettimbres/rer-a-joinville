<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Siel RER A - Joinville</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f5; --red: #c0333a; --dark: #222; --yellow: #fbc02d; }
        body { background: var(--bg); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red); background: white; }
        .logo-a { background: var(--red); border-radius: 12px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: white; }
        .clock { background: var(--dark); color: white; padding: 10px 20px; border-radius: 8px; font-size: 28px; }
        .list { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .row { display: grid; grid-template-columns: 100px 1fr 120px; align-items: center; padding: 15px 0; border-bottom: 2px solid #ddd; }
        .mission { background: #ddd; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; }
        .destination { font-size: 26px; font-weight: 700; text-transform: uppercase; padding-left: 15px; }
        .time { background: var(--dark); color: var(--yellow); border-radius: 6px; text-align: center; padding: 8px; min-width: 80px; }
        .time .val { font-size: 32px; font-weight: bold; display: block; line-height: 0.8; }
        footer { background: #333; color: #0f0; padding: 10px 20px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <div class="logo-a">A</div>
        <div style="margin-left:15px; font-size:22px; font-weight:bold;">JOINVILLE-LE-PONT</div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="list" id="board">
    <div style="text-align:center; margin-top:100px; color:#999;">Chargement des données...</div>
</div>

<footer id="debug-log">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    
    // On utilise l'ID de quai qui a fonctionné au début (sans erreur "inconnu")
    const STOP_ID = 'STIF:StopPoint:Q:22105:'; 

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchData() {
        const debug = document.getElementById('debug-log');
        const board = document.getElementById('board');
        debug.innerText = "> Interrogation du serveur...";

        // URL ultra-simple : pas de LineRef pour éviter l'erreur 400
        const target = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${STOP_ID}&apikey=${API_KEY}`;
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

        try {
            const response = await fetch(proxy);
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];
            
            // Si le serveur renvoie une erreur interne
            if (delivery?.ErrorCondition) {
                debug.innerText = "> Erreur API : " + delivery.ErrorCondition.ErrorInformation.ErrorText;
                return;
            }

            const visits = delivery?.MonitoredStopVisit;

            if (!visits || visits.length === 0) {
                debug.innerText = "> Réponse vide (aucun train en approche).";
                board.innerHTML = '<div style="text-align:center;margin-top:50px;">Aucun passage prévu actuellement.</div>';
                return;
            }

            debug.innerText = `> Succès : ${visits.length} trains trouvés à ${new Date().toLocaleTimeString()}`;
            
            // Affichage sans AUCUN filtre pour voir si des données arrivent
            let html = '';
            visits.forEach(v => {
                const j = v.MonitoredVehicleJourney;
                const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '');
                const mission = j.JourneyNote?.[0]?.value || j.PublishedLineName?.[0]?.value || "??";
                const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
                const diff = Math.round((time - new Date()) / 60000);

                html += `
                    <div class="row">
                        <div class="mission">${mission}</div>
                        <div class="destination">${dest}</div>
                        <div class="time">
                            <span class="val">${diff <= 0 ? 'À' : diff}</span>
                            <span style="font-size:10px">${diff <= 0 ? 'approche' : 'min'}</span>
                        </div>
                    </div>`;
            });
            board.innerHTML = html;

        } catch (e) {
            debug.innerText = "> Erreur de connexion ou de clé.";
        }
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchData();
    setInterval(fetchData, 30000);
</script>
</body>
</html>
