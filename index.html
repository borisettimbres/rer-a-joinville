<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siel RER A - Diagnostic</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-bg-main: #f5f5f5;
            --ratp-text-black: #000000;
            --ratp-bg-dark: #222222;
            --ratp-text-yellow: #fbc02d;
            --ratp-line-a-red: #c0333a;
            --ratp-quai-gray: #b0bec5;
            --ratp-border-gray: #e0e0e0;
        }
        body { background-color: var(--ratp-bg-main); color: var(--ratp-text-black); font-family: 'Cabin', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background-color: var(--ratp-bg-main); padding: 15px 25px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; border-bottom: 8px solid var(--ratp-line-a-red); }
        .header-logos { display: flex; align-items: center; gap: 12px; }
        .logo-rer { border: 4px solid #1a1a1a; background: white; border-radius: 12px; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; }
        .logo-a { background-color: var(--ratp-line-a-red); border-radius: 12px; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; color: white; }
        .header-destinations { margin-left: 20px; }
        .dest-row { font-size: 22px; font-weight: 700; text-transform: uppercase; line-height: 1.1; }
        .header-time { background-color: var(--ratp-bg-dark); color: white; padding: 8px 18px; border-radius: 8px; font-size: 28px; font-weight: 700; }
        .train-list { flex-grow: 1; padding: 0 25px; overflow-y: auto; }
        .train-row { display: grid; grid-template-columns: 100px 1fr 140px 100px; align-items: center; padding: 15px 0; border-bottom: 2px solid var(--ratp-border-gray); }
        .mission-code { background-color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; font-family: monospace; text-align: center; }
        .destination-name { font-size: 26px; font-weight: 700; text-transform: uppercase; }
        .time-box { background-color: var(--ratp-bg-dark); color: var(--ratp-text-yellow); border-radius: 6px; text-align: center; padding: 6px; width: 100px; }
        .time-box .val { font-size: 32px; font-weight: 700; display: block; line-height: 0.9; }
        .time-box .unit { font-size: 11px; text-transform: lowercase; }
        .quai-box { background-color: var(--ratp-quai-gray); border: 1px solid #78909c; border-radius: 6px; text-align: center; width: 65px; margin-left: auto; }
        .quai-box .label { font-size: 10px; display: block; }
        .quai-box .val { font-size: 22px; font-weight: 700; }
        footer { background: #333; color: white; padding: 10px 30px; font-size: 12px; font-family: monospace; }
    </style>
</head>
<body>

<header>
    <div class="header-logos">
        <div class="logo-rer">RER</div>
        <div class="logo-a">A</div>
    </div>
    <div class="header-destinations">
        <div class="dest-row" id="station-title">Joinville-le-Pont</div>
        <div class="dest-row" style="font-size: 14px; color: var(--ratp-line-a-red);">MODE DIAGNOSTIC : TOUTES DIRECTIONS</div>
    </div>
    <div class="header-time" id="clock">--:--</div>
</header>

<div class="train-list" id="board">
    <div style="text-align:center; margin-top:50px; color:#999;">Analyse du flux entrant...</div>
</div>

<footer id="footer">
    <div id="status-msg">Attente données...</div>
</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    
    // On essaie l'ID de zone Châtelet exemple du Swagger pour tester si Joinville répond
    // Mais on garde votre ID Joinville-le-Pont
    const MONITORING_REF = 'STIF:StopPoint:Q:22105:'; 
    const LINE_REF = 'STIF:Line::C01742:'; // RER A

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        // Construction selon GET /stop-monitoring
        const apiTarget = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}&LineRef=${LINE_REF}`;
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(apiTarget);

        try {
            const response = await fetch(proxyUrl, {
                method: 'GET',
                headers: { 'apikey': API_KEY, 'Accept': 'application/json' } // apikey requis dans le header
            });

            if (!response.ok) throw new Error(`Erreur ${response.status}`);

            const data = await response.json();
            console.log("Data reçue:", data);

            if (data.Siri && data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit) {
                const visits = data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit;
                document.getElementById('status-msg').innerText = `Flux OK : ${visits.length} trains trouvés.`;
                renderBoard(visits);
            } else {
                document.getElementById('status-msg').innerText = "Serveur connecté, mais liste MonitoredStopVisit vide.";
                document.getElementById('board').innerHTML = `<div style="padding:20px; font-size:14px; color:red;">Réponse vide d'IDFM. L'arrêt ${MONITORING_REF} n'a peut-être pas de temps réel en ce moment.</div>`;
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "Erreur liaison : " + e.message;
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        // AUCUN FILTRE pour voir ce que l'API envoie réellement
        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime));

        trains.forEach(j => {
            const mission = j.JourneyNote[0] ? j.JourneyNote[0].value : '----';
            const dest = j.DestinationName[0].value.toUpperCase();
            const dir = j.DirectionName[0].value; // Pour voir la valeur de direction
            
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime);
            const diffMin = Math.floor((depTime - new Date()) / 60000);
            
            let timeVal = diffMin <= 0 ? "À" : diffMin;
            let timeUnit = diffMin <= 0 ? "l'approche" : "min";

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${mission}</div>
                    <div class="destination-name">
                        ${dest}<br>
                        <small style="font-size:10px; color:blue;">DIR RECUE: ${dir}</small>
                    </div>
                    <div class="time-box"><span class="val">${timeVal}</span><span class="unit">${timeUnit}</span></div>
                    <div class="quai-box"><span class="label">quai</span><span class="val">2</span></div>
                </div>`;
        });
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
