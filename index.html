<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    
    // Changement ici : On utilise ArretPoint qui est le plus fiable pour le RER
    const STOP_ID = 'STIF:ArretPoint:Q:22105'; 

    function log(msg) { document.getElementById('debug-log').innerText = msg; }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        // Ajout d'un timestamp pour éviter la mise en cache du proxy
        const target = `https://prim.iledefrance-mobilites.fr/marketplace/v1/stop-monitoring?MonitoringRef=${STOP_ID}&apikey=${API_KEY}`;
        const proxy = 'https://corsproxy.io/?' + encodeURIComponent(target);

        try {
            const response = await fetch(proxy);
            
            if (!response.ok) {
                // Si ça échoue encore, on affiche l'ID testé pour débugger
                log(`Erreur ${response.status} sur ${STOP_ID}`);
                return;
            }

            const data = await response.json();
            
            // Structure Siri Lite
            const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];
            
            if (delivery && delivery.MonitoredStopVisit && delivery.MonitoredStopVisit.length > 0) {
                renderBoard(delivery.MonitoredStopVisit);
                log("Connexion établie - Mise à jour : " + new Date().toLocaleTimeString());
            } else {
                log("Aucun train détecté pour cet arrêt.");
                document.getElementById('board').innerHTML = '<div style="text-align:center; margin-top:100px; font-size:18px; color:#999;">Pas de trains prévus.</div>';
            }
        } catch (e) {
            log("Erreur réseau ou Proxy indisponible.");
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        const now = new Date();

        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            // Filtre : Uniquement vers l'Ouest (Paris/St-Germain/Poissy/Cergy)
            .filter(j => {
                const dest = j.DestinationName[0].value.toLowerCase();
                // On exclut Boissy et La Varenne qui sont à l'Est
                return !dest.includes('boissy') && !dest.includes('varenne');
            })
            .sort((a, b) => {
                const timeA = new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime);
                const timeB = new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime);
                return timeA - timeB;
            })
            .slice(0, 6);

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center; margin-top:100px; font-size:18px; color:#999;">Aucun train vers Paris trouvé.</div>';
            return;
        }

        trains.forEach(j => {
            // Extraction du code mission (ex: NELY, WYDE)
            const mission = j.JourneyNote && j.JourneyNote[0] ? j.JourneyNote[0].value : "RER A";
            const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '');
            
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diffMin = Math.round((depTime - now) / 60000);
            
            let timeVal = diffMin <= 0 ? "À" : diffMin;
            let timeUnit = diffMin <= 0 ? "l'approche" : "min";

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${mission}</div>
                    <div class="destination-name">${dest}</div>
                    <div class="time-box">
                        <span class="val">${timeVal}</span>
                        <span class="unit">${timeUnit}</span>
                    </div>
                    <div class="quai-box">
                        <span class="label">quai</span>
                        <span class="val">2</span>
                    </div>
                </div>`;
        });
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 20000);
</script>
