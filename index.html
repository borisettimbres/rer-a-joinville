<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siel RER A - Live Joinville</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-bg-main: #f5f5f5;
            --ratp-text-black: #000000;
            --ratp-bg-dark: #222222;
            --ratp-text-yellow: #fbc02d;
            --ratp-line-a-red: #c0333a;
            --ratp-quai-gray: #b0bec5;
            --ratp-border-gray: #e0e0e0;
        }

        body {
            background-color: var(--ratp-bg-main);
            color: var(--ratp-text-black);
            font-family: 'Cabin', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            letter-spacing: -0.5px;
        }

        /* --- HEADER (Logos CSS) --- */
        header {
            background-color: var(--ratp-bg-main);
            padding: 15px 25px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            border-bottom: 8px solid var(--ratp-line-a-red);
        }

        .header-logos { display: flex; align-items: center; gap: 12px; }

        .logo-rer {
            border: 4px solid #1a1a1a; background: white; border-radius: 14px;
            width: 60px; height: 60px; display: flex; align-items: center;
            justify-content: center; font-size: 24px; font-weight: 900;
        }

        .logo-a {
            background-color: var(--ratp-line-a-red); border-radius: 14px;
            width: 70px; height: 70px; display: flex; align-items: center;
            justify-content: center; font-size: 50px; font-weight: 900; color: white;
        }

        .header-destinations { margin-left: 20px; }
        .dest-row { font-size: 22px; font-weight: 700; text-transform: uppercase; line-height: 1.2; }

        .header-time {
            background-color: var(--ratp-bg-dark); color: white;
            padding: 10px 20px; border-radius: 10px; font-size: 30px; font-weight: 700;
        }

        /* --- LISTE DES TRAINS --- */
        .train-list { flex-grow: 1; padding: 0 25px; }

        .train-row {
            display: grid;
            grid-template-columns: 120px 1fr 140px 100px;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--ratp-border-gray);
        }

        .mission-code {
            background-color: #e0e0e0; padding: 5px 10px; border-radius: 5px;
            font-size: 16px; font-weight: bold; font-family: monospace;
            width: fit-content; text-align: center;
        }

        .destination-name { font-size: 35px; font-weight: 700; text-transform: uppercase; }

        .time-box {
            background-color: var(--ratp-bg-dark); color: var(--ratp-text-yellow);
            border-radius: 8px; text-align: center; padding: 8px; width: 110px;
        }
        .time-box .val { font-size: 42px; font-weight: 700; display: block; line-height: 0.9; }
        .time-box .unit { font-size: 14px; text-transform: lowercase; }

        .quai-box {
            background-color: var(--ratp-quai-gray); border: 1px solid #78909c;
            border-radius: 8px; text-align: center; width: 70px; margin-left: auto;
        }
        .quai-box .label { font-size: 12px; display: block; }
        .quai-box .val { font-size: 30px; font-weight: 700; }

        /* --- FOOTER --- */
        .footer-alert {
            background: white; padding: 20px 30px;
            display: flex; align-items: center; gap: 20px;
            border-top: 2px solid var(--ratp-border-gray);
        }

        .alert-logo-a {
            background: var(--ratp-line-a-red); color: white;
            border-radius: 50%; width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .alert-text { font-size: 16px; font-weight: 400; flex: 1; }

        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        .status-live { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
    </style>
</head>
<body>

<header>
    <div class="header-logos">
        <div class="logo-rer">RER</div>
        <div class="logo-a">A</div>
    </div>
    <div class="header-destinations">
        <div class="dest-row">Paris • St-Germain-en-Laye</div>
        <div class="dest-row">Poissy • Cergy</div>
    </div>
    <div class="header-time" id="clock">--:--</div>
</header>

<div class="train-list" id="board">
    <div style="text-align:center; margin-top:100px; font-size:24px; color:#999;">
        Initialisation du système SIEL...
    </div>
</div>

<div class="footer-alert">
    <div class="alert-logo-a">A</div>
    <div style="font-size: 30px;">⚠️</div>
    <div class="alert-text" id="status-bar">
        Connexion au flux temps réel IDFM...
    </div>
    <div id="live-indicator" class="status-dot"></div>
</div>

<script>
    // --- CONFIGURATION ---
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const STOP_ID = 'STIF:StopPoint:Q:22105:'; // Joinville-le-Pont
    
    // URL avec clé intégrée + Proxy CORS
    const TARGET_URL = `https://prim.iledefrance-mobilites.fr/marketplace/v1/stop-monitoring?MonitoringRef=${STOP_ID}&apikey=${API_KEY}`;
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(TARGET_URL);

    // --- HORLOGE ---
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    // --- RÉCUPÉRATION DES DONNÉES ---
    async function fetchSchedules() {
        try {
            const response = await fetch(PROXY_URL);
            
            // LOGIQUE DÉTECTIVE : On vérifie si le serveur nous rejette
            if (!response.ok) {
                document.getElementById('status-bar').innerText = `⚠️ Erreur IDFM : ${response.status} (Vérifiez l'abonnement PRIM)`;
                document.getElementById('live-indicator').classList.remove('status-live');
                showDemo();
                return;
            }
            
            const data = await response.json();
            
            // Navigation dans la structure complexe de l'API IDFM
            if (data.Siri && 
                data.Siri.ServiceDelivery.StopMonitoringDelivery[0] && 
                data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit) {
                
                const visits = data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit;
                renderBoard(visits);
                
                document.getElementById('status-bar').innerText = "Trafic normal sur l'ensemble de la ligne A. Flux temps réel actif.";
                document.getElementById('live-indicator').classList.add('status-live');
            } else {
                document.getElementById('status-bar').innerText = "⚠️ Liaison établie mais aucune donnée reçue.";
                showDemo();
            }
        } catch (error) {
            console.error("Erreur réseau:", error);
            document.getElementById('status-bar').innerText = "⚠️ Impossible de contacter le serveur (Problème Proxy ou Réseau).";
            document.getElementById('live-indicator').classList.remove('status-live');
            showDemo();
        }
    }

    // --- AFFICHAGE ---
    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        // Filtrage : On garde la direction Paris/Ouest (souvent notée "A" dans PRIM pour cette gare)
        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => j.DirectionName[0].value === "A")
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime))
            .slice(0, 5);

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center; margin-top:50px; font-size:24px;">Aucun train vers l\'Ouest détecté.</div>';
            return;
        }

        trains.forEach(j => {
            const mission = j.JourneyNote[0] ? j.JourneyNote[0].value : '----';
            const dest = j.DestinationName[0].value.toUpperCase();
            
            // Calcul des minutes restantes
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime);
            const diffMin = Math.floor((depTime - new Date()) / 60000);
            
            let timeVal = diffMin;
            let timeUnit = "min";
            
            if (diffMin <= 0) {
                timeVal = "À";
                timeUnit = "l'approche";
            } else if (diffMin > 60) {
                timeVal = depTime.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
                timeUnit = "";
            }

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${mission}</div>
                    <div class="destination-name">${dest}</div>
                    <div class="time-box">
                        <span class="val">${timeVal}</span>
                        <span class="unit">${timeUnit}</span>
                    </div>
                    <div class="quai-box">
                        <span class="label">quai</span>
                        <span class="val">2</span>
                    </div>
                </div>`;
        });
    }

    // --- MODE SECOURS (Données réalistes) ---
    function showDemo() {
        const board = document.getElementById('board');
        // On ne vide pas si des données réelles étaient déjà là (on garde les dernières infos)
        if (board.querySelectorAll('.train-row').length > 0) return;

        const faux = [
            {m:'ZEUS', d:'ST-GERMAIN-EN-LAYE', t:5},
            {m:'NELY', d:'CERGY-LE-HAUT', t:12},
            {m:'TERI', d:'POISSY', t:24},
            {m:'ZEUS', d:'ST-GERMAIN-EN-LAYE', t:35}
        ];
        board.innerHTML = '';
        faux.forEach(f => {
            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${f.m}</div>
                    <div class="destination-name">${f.d}</div>
                    <div class="time-box"><span class="val">${f.t}</span><span class="unit">min</span></div>
                    <div class="quai-box"><span class="label">quai</span><span class="val">2</span></div>
                </div>`;
        });
    }

    // --- LANCEMENT ---
    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000); // Mise à jour auto toutes les 30s
</script>

</body>
</html>
