<script>
    // Source alternative sans clé complexe
    const API_URL = 'https://api-ratp.pierre-grimaud.fr/v4/schedules/rers/a/joinville+le+pont/A';
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);

    async function fetchSchedules() {
        try {
            const response = await fetch(PROXY_URL);
            const data = await response.json();
            
            if (data.result && data.result.schedules) {
                renderBoard(data.result.schedules);
            }
        } catch (error) {
            document.getElementById('board').innerHTML = '<div class="status-msg">Erreur de liaison API</div>';
        }
    }

    function renderBoard(trains) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        trains.forEach(t => {
            board.innerHTML += `
                <div class="train-row">
                    <div class="mission">${t.code}</div>
                    <div class="destination">${t.destination}</div>
                    <div class="time">${t.message.replace('mn', 'min')}</div>
                </div>`;
        });
    }

    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
