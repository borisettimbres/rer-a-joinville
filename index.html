<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siel RER A - Joinville</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ratp-bg-main: #f5f5f5;
            --ratp-text-black: #000000;
            --ratp-bg-dark: #222222;
            --ratp-text-yellow: #fbc02d;
            --ratp-line-a-red: #c0333a;
            --ratp-quai-gray: #b0bec5;
            --ratp-border-gray: #e0e0e0;
        }
        body { background-color: var(--ratp-bg-main); color: var(--ratp-text-black); font-family: 'Cabin', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background-color: var(--ratp-bg-main); padding: 15px 25px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; border-bottom: 8px solid var(--ratp-line-a-red); }
        .header-logos { display: flex; align-items: center; gap: 12px; }
        .logo-rer { border: 4px solid #1a1a1a; background: white; border-radius: 12px; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; }
        .logo-a { background-color: var(--ratp-line-a-red); border-radius: 12px; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; color: white; }
        .header-destinations { margin-left: 20px; }
        .dest-row { font-size: 24px; font-weight: 700; text-transform: uppercase; line-height: 1.1; }
        .header-time { background-color: var(--ratp-bg-dark); color: white; padding: 8px 18px; border-radius: 8px; font-size: 28px; font-weight: 700; }
        .train-list { flex-grow: 1; padding: 0 25px; }
        .train-row { display: grid; grid-template-columns: 130px 1fr 140px 100px; align-items: center; padding: 18px 0; border-bottom: 2px solid var(--ratp-border-gray); }
        .mission-code { background-color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 16px; font-weight: bold; font-family: monospace; text-align: center; }
        .destination-name { font-size: 32px; font-weight: 700; text-transform: uppercase; padding-left: 15px; }
        .time-box { background-color: var(--ratp-bg-dark); color: var(--ratp-text-yellow); border-radius: 6px; text-align: center; padding: 6px; width: 110px; }
        .time-box .val { font-size: 42px; font-weight: 700; display: block; line-height: 0.9; }
        .time-box .unit { font-size: 13px; text-transform: lowercase; }
        .quai-box { background-color: var(--ratp-quai-gray); border: 1px solid #78909c; border-radius: 6px; text-align: center; width: 65px; margin-left: auto; }
        .quai-box .label { font-size: 11px; display: block; }
        .quai-box .val { font-size: 26px; font-weight: 700; }
        footer { background: #333; padding: 8px 20px; color: #00ff00; font-size: 11px; font-family: monospace; border-top: 1px solid #000; }
    </style>
</head>
<body>

<header>
    <div class="header-logos">
        <div class="logo-rer">RER</div>
        <div class="logo-a">A</div>
    </div>
    <div class="header-destinations">
        <div class="dest-row">Joinville-le-Pont</div>
        <div class="dest-row" style="font-size: 16px; color: var(--ratp-line-a-red);">DIRECTION PARIS / OUEST</div>
    </div>
    <div class="header-time" id="clock">--:--</div>
</header>

<div class="train-list" id="board">
    <div style="text-align:center; margin-top:100px; font-size:22px; color:#999;">Initialisation du flux...</div>
</div>

<footer id="debug-log">Démarrage...</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const STOP_ID = 'STIF:ArretPoint:Q:22105'; 

    function log(msg) { 
        document.getElementById('debug-log').innerText = "> " + msg;
        console.log(msg);
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        log("Tentative de connexion à PRIM...");
        
        const target = `https://prim.iledefrance-mobilites.fr/marketplace/v1/stop-monitoring?MonitoringRef=${STOP_ID}&apikey=${API_KEY}`;
        // Changement de proxy vers AllOrigins (plus robuste pour le JSON)
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

        try {
            const response = await fetch(proxy);
            if (!response.ok) throw new Error("Erreur HTTP " + response.status);
            
            const rawData = await response.json();
            // AllOrigins encapsule la réponse dans .contents
            const data = JSON.parse(rawData.contents);
            
            log("Données reçues, analyse en cours...");

            const delivery = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0];
            const visits = delivery?.MonitoredStopVisit;

            if (visits && visits.length > 0) {
                renderBoard(visits);
                log("Flux OK - Mise à jour à " + new Date().toLocaleTimeString());
            } else {
                log("Aucun train trouvé dans le flux.");
                document.getElementById('board').innerHTML = '<div style="text-align:center; margin-top:100px; font-size:18px; color:#999;">Aucun train en approche.</div>';
            }
        } catch (e) {
            log("ERREUR : " + e.message);
            document.getElementById('board').innerHTML = '<div style="text-align:center; margin-top:100px; font-size:18px; color:red;">Erreur de liaison API.</div>';
        }
    }

    function renderBoard(visits) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const now = new Date();

        const trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const dest = j.DestinationName[0].value.toLowerCase();
                // Filtre Ouest : on ignore Boissy et La Varenne
                return !dest.includes('boissy') && !dest.includes('varenne');
            })
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime))
            .slice(0, 6);

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center; margin-top:100px; font-size:18px; color:#999;">Pas de trains vers Paris trouvés.</div>';
            return;
        }

        trains.forEach(j => {
            const mission = j.JourneyNote && j.JourneyNote[0] ? j.JourneyNote[0].value : "----";
            const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '').trim();
            const depTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diffMin = Math.round((depTime - now) / 60000);
            
            let timeVal = diffMin <= 0 ? "À" : diffMin;
            let timeUnit = diffMin <= 0 ? "l'approche" : "min";

            board.innerHTML += `
                <div class="train-row">
                    <div class="mission-code">${mission}</div>
                    <div class="destination-name">${dest}</div>
                    <div class="time-box">
                        <span class="val">${timeVal}</span>
                        <span class="unit">${timeUnit}</span>
                    </div>
                    <div class="quai-box">
                        <span class="label">quai</span>
                        <span class="val">2</span>
                    </div>
                </div>`;
        });
    }

    // Démarrage
    setInterval(updateClock, 1000);
    updateClock();
    
    // Petit délai pour laisser le navigateur respirer au chargement
    setTimeout(fetchSchedules, 1000);
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
